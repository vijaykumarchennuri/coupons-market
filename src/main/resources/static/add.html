<!DOCTYPE html>
<html>
<head>
    <title>Add Coupon</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Add Coupon</h2>

<input id="title" placeholder="Title"><br>
<input id="code" placeholder="Coupon Code"><br>
<input id="price" placeholder="Price"><br>
<input id="phone" placeholder="Phone"><br>

<button onclick="addCoupon()">Add</button>
<button onclick="back()">Back</button>

<script>
const API = "https://coupons-market-1.onrender.com";

function addCoupon() {

    let userId = localStorage.getItem("userId");
    console.log("User ID:", userId);
    fetch(API + "/coupon/add/" + userId, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            title: document.getElementById("title").value,
            couponCode: document.getElementById("code").value,
            price: document.getElementById("price").value,
            phoneNumber: document.getElementById("phone").value
        })
    })
    .then(() => {
        alert("Added!");
        window.location.href = "dashboard.html";
    });
}

function back() {
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
