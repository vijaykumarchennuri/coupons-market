<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
        }

        button {
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #5a67d8;
            color: white;
        }

        button:hover {
            background: #434190;
        }

        .card {
            background: white;
            color: black;
            width: 350px;
            margin: 15px auto;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
    </style>

</head>

<body>

<h2 id="welcome"></h2>

<button onclick="goToAdd()">Add Coupon</button>
<button onclick="logout()">Logout</button>

<h3>Available Coupons</h3>

<div id="list"></div>

<script>
const API = "https://coupons-market-1.onrender.com";

// Show username
document.getElementById("welcome").innerText =
    "Welcome " + localStorage.getItem("username");

// Load coupons
fetch(API + "/coupon/all")
.then(res => res.json())
.then(data => {

    let list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(c => {

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML =
            "<b>" + c.title + "</b><br>" +
            "Code: " + c.couponCode + "<br>" +
            "Price: ₹ " + Number(c.price).toFixed(0) + "<br>" +
            "Phone: " + c.phoneNumber + "<br>" +
            "User: " + c.username + "<br>";

        // Show edit/delete only for owner
        if (c.username === localStorage.getItem("username")) {

            let editBtn = document.createElement("button");
            editBtn.innerText = "Edit";
            editBtn.onclick = function() { editCoupon(c); };

            let delBtn = document.createElement("button");
            delBtn.innerText = "Delete";
            delBtn.onclick = function() { deleteCoupon(c.id); };

            div.appendChild(editBtn);
            div.appendChild(delBtn);
        }

        list.appendChild(div);
    });
});

// Edit coupon
function editCoupon(c) {

    let title = prompt("Enter new title", c.title);
    let code = prompt("Enter new code", c.couponCode);
    let price = prompt("Enter new price", c.price);
    let phone = prompt("Enter new phone", c.phoneNumber);

    fetch(API + "/coupon/update/" + c.id, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            title: title,
            couponCode: code,
            price: price,
            phoneNumber: phone
        })
    })
    .then(() => {
        alert("Updated successfully!");
        location.reload();
    });
}

// Delete coupon
function deleteCoupon(id) {

    if (confirm("Are you sure you want to delete?")) {

        fetch(API + "/coupon/delete/" + id, {
            method: "DELETE"
        })
        .then(() => {
            alert("Deleted!");
            location.reload();
        });
    }
}


// Navigation
function goToAdd() {
    window.location.href = "add.html";
}

// Logout
function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}
</script>

</body>
</html>
